server {
    listen 80;
    server_name _;

    # Flutter web build output
    root /var/www/story_roles_web;
    index index.html;

    # Proxy: API calls → backend (brak CORS bo same-origin)
    location /api/ {
        proxy_pass https://storyroles.com/api/;
        proxy_ssl_server_name on;
        proxy_set_header Host storyroles.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy: auth endpoints
    location ~ ^/(login|signup) {
        proxy_pass https://storyroles.com;
        proxy_ssl_server_name on;
        proxy_set_header Host storyroles.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Flutter web SPA — wszystkie inne ścieżki → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
